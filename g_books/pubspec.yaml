name: g_books
description: "G-Books 蹟不可師 — 台灣古蹟教育遊戲"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  go_router: ^14.6.1
  image_picker: ^1.1.2
  crop_your_image: ^2.0.0
  path_provider: ^2.1.5
  fluttertoast: ^9.1.0
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    # App
    - assets/logo.png                  # App logo（載入畫面）

    # 設定資料：JSON，假後端「首次種子化」的來源（之後以本機檔為準）
    - assets/data/slots/               # 各古蹟 slot 幾何
    - assets/data/component_slots/     # 各古蹟 原料→可放 slot 對應

    # 古蹟圖文資訊：Markdown，InfoDialog 呈現（一座古蹟一資料夾）
    # heritage.md = 古蹟介紹、components/<id>.md = 各原料介紹
    - assets/data/heritages/beigang_chaotian_temple/
    - assets/data/heritages/beigang_chaotian_temple/components/

    # 背景圖
    - assets/images/bg_login.png       # 登入頁
    - assets/images/bg_group_info.png  # 小組總覽
    - assets/images/bg_view.png        # 古蹟檢視頁
    - assets/images/edit_grid.png      # 古蹟編輯格線
    - assets/images/fight_map.png      # 攻防戰地圖（功能預留）

    # 古蹟圖片（一座古蹟一資料夾）
    - assets/images/heritages/heritage_cards/                     # 選古蹟卡片
    - assets/images/heritages/beigang_chaotian_temple/            # main.png 等
    - assets/images/heritages/beigang_chaotian_temple/components/ # 原料圖
    - assets/images/heritages/beigang_chaotian_temple/info/       # 資訊用圖（md ![](檔名) 自動補 info/ 前綴；新增子資料夾須在此登記）

    # icons
    - assets/icons/buttons/            # 功能按鈕圖
    - assets/icons/card_frames/        # 原料卡框（綠/黃/紅）
