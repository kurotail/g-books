name: g_books
description: "G-Books 蹟不可師 — 台灣古蹟教育遊戲"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  go_router: ^14.6.1
  image_picker: ^1.1.2
  crop_your_image: ^2.0.0
  path_provider: ^2.1.5
  fluttertoast: ^9.1.0
  flutter_markdown_plus: ^1.0.7
  record: ^6.0.0          # 資源採集語音作答：錄音
  audioplayers: ^6.1.0    # 語音題敘述 / 回放錄音作答

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    # ── 共用（跨古蹟）────────────────────────────────────────────────
    - assets/logo.png                  # App logo（載入畫面）
    # 背景圖
    - assets/images/bg_login.png       # 登入頁
    - assets/images/bg_group_info.png  # 小組總覽
    - assets/images/bg_view.png        # 古蹟檢視頁
    - assets/images/edit_grid.png      # 古蹟編輯格線
    - assets/images/fight_map.png      # 攻防戰地圖（功能預留）
    # icons
    - assets/icons/                    # star.png / times_up.png 等
    - assets/icons/buttons/            # 功能按鈕圖
    - assets/icons/card_frames/        # 原料卡框（綠/黃/紅）

    # ── 古蹟：一座一資料夾 assets/heritages/<hid>/ ────────────────────
    # 新增一座古蹟 ＝ 複製下方「<hid>/ 四行區塊」改 hid + 在 heritage_data.dart 加一筆。
    # <hid>/            info.md, card.png, main.png, enemy.png
    #                   （slot/原料設定 json 不放 assets，改由後端 building 提供、
    #                     學生登入後載入並快取本機；見 StudentConfigLoader）
    # <hid>/area/       資源採集難度區域圖 easy/mid/hard.png
    # <hid>/info_imgs/  info.md 內 ![](檔名) 自動補 <hid>/info_imgs/ 前綴的圖
    # <hid>/components/ 原料圖 <id>.png ＋ 原料介紹 <id>.md
    - assets/heritages/beigang_chaotian_temple/
    - assets/heritages/beigang_chaotian_temple/area/
    - assets/heritages/beigang_chaotian_temple/info_imgs/
    - assets/heritages/beigang_chaotian_temple/components/
    # stub：內容待補，目前僅卡片 card.png
    - assets/heritages/anping_old_fort/
    - assets/heritages/chihkan_tower/
    - assets/heritages/former_british_consular_residence/
