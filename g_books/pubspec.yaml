name: g_books
description: "G-Books 蹟不可師 — 台灣古蹟教育遊戲"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  go_router: ^14.6.1
  image_picker: ^1.1.2
  crop_your_image: ^2.0.0
  path_provider: ^2.1.5
  fluttertoast: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/data/slots/             # 各古蹟 slot 幾何 JSON
    - assets/data/component_slots/   # 各古蹟 元件→可放slot 對應 JSON
    - assets/images/bg_view.png       # 古蹟檢視頁背景
    - assets/images/edit_grid.png     # 古蹟編輯頁背景
    - assets/images/fight_map.png
    - assets/images/heritages/heritage_cards/
    - assets/images/heritages/beigang_chaotian_temple/
    - assets/images/heritages/beigang_chaotian_temple/conponents/
    - assets/icons/buttons/
    - assets/icons/card_frames/
