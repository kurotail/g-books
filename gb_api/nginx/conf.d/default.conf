# Upstream: the Go API service on the internal compose network.
upstream gb_api {
    server api:8080;
}

# Required so WebSocket upgrade requests (e.g. /api/state/ws) are proxied
# correctly while normal requests keep their connection handling.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    return 301 https://$host$request_uri;
}

# HTTPS terminator + reverse proxy.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Cap upload size to the largest API media limit (keep in sync with
    # MAX_AUDIO_MB). nginx rejects bigger bodies before they reach the API.
    client_max_body_size 25m;

    # Serve uploaded media straight off the shared volume (never hits the API).
    # The /images/ and /audio/ prefixes map to subdirs under /srv/uploads via root.
    location ~ ^/(images|audio)/ {
        root /srv/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://gb_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Keep long-lived WebSocket connections open.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
