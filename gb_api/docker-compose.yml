services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs once on a fresh pgdata volume: creates the schema and loads demo data.
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    image: gb-api:latest
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - uploads:/srv/uploads
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      # Read-only access to the same volume the API writes uploads to.
      - uploads:/srv/uploads:ro
    restart: unless-stopped

volumes:
  uploads:
  pgdata:
